<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Leaves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="app-page">
  <div class="app-layout" id="app"></div>
  <script src="api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      if (user.role === "admin") loadAndRenderAdminLeave();
      else loadAndRenderEmployeeLeave();
      initSidebar();
    }

    async function loadAndRenderAdminLeave() {
      try {
        const [leaves, employees] = await Promise.all([
          getAllLeaves(),
          apiGet(API.employees.all())
        ]);
        renderAdminLeave(leaves, employees);
      } catch (error) {
        console.error('Error loading admin leave data:', error);
        document.getElementById("app").innerHTML = `
          ${renderSidebar("admin", "leave-management")}
          <main class="main-content">
            ${renderTopbar("Leave Management", "Admin / Leaves")}
            <div class="content-area">
              <div class="card" style="padding:40px;text-align:center">
                <p style="color:var(--color-danger)">Failed to load leave data. Please try again.</p>
                <button class="btn btn-primary" onclick="loadAndRenderAdminLeave()">Retry</button>
              </div>
            </div>
          </main>
        `;
      }
    }

    // ===== Admin Leave Management =====
    function renderAdminLeave(leaves, employees) {
      const sortedLeaves = [...leaves].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "leave-management")}
        <main class="main-content">
          ${renderTopbar("Leave Management", "Admin / Leaves")}
          <div class="content-area">
            ${sortedLeaves.length === 0 ? `
              <div class="card" style="padding: 60px 20px; text-align: center;">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; color: var(--color-text-muted); margin-bottom: 16px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <h4>No Leave Requests</h4>
                  <p>No leave requests have been submitted yet. They will appear here once employees apply for leaves.</p>
                </div>
              </div>
            ` : `
            <div class="card">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Employee</th>
                      <th>Type</th>
                      <th>Start</th>
                      <th>End</th>
                      <th>Days</th>
                      <th>Status</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${sortedLeaves.map(l => {
        const empName = l.employee_id ? l.employee_id.name : 'Unknown';
        return `
                      <tr>
                        <td><strong>${empName}</strong></td>
                        <td>${l.leave_type}</td>
                        <td>${formatDate(l.start_date)}</td>
                        <td>${formatDate(l.end_date)}</td>
                        <td>${l.number_of_days || '-'}</td>
                        <td>${getStatusBadge(l.status)}</td>
                        <td>
                          <div class="action-btns">
                            ${l.status === 'Pending' ? `
                              <button class="btn btn-success btn-sm" onclick="updateLeave('${l._id}', 'Approved')">Accept</button>
                              <button class="btn btn-danger btn-sm" onclick="updateLeave('${l._id}', 'Rejected')">Reject</button>
                            ` : `<span style="color: var(--color-text-muted); font-size: 0.8125rem;">Processed</span>`}
                          </div>
                        </td>
                      </tr>
                    `}).join("")}
                  </tbody>
                </table>
              </div>
            </div>
            `}
          </div>
        </main>
      `;
    }

    window.updateLeave = async function (id, status) {
      let rejectionReason = '';
      if (status === 'Rejected') {
        const reason = prompt("Please provide a reason for rejection:");
        if (reason === null) return;
        if (reason.trim() === "") {
          showToast("A reason is required for rejection", "error");
          return;
        }
        rejectionReason = reason;
      }

      try {
        const endpoint = status === 'Approved' ? API.leaves.approve(id) : API.leaves.reject(id);
        const body = status === 'Rejected' ? { rejection_reason: rejectionReason } : {};
        await apiPut(endpoint, body);
        showToast(`Leave request ${status.toLowerCase()}`, "success");
        await loadAndRenderAdminLeave();
      } catch (error) {
        console.error('Error updating leave:', error);
        showToast(error.message || "Failed to update leave", "error");
      }
    };

    // ===== Employee Leave Application =====
    async function loadAndRenderEmployeeLeave() {
      try {
        const [leaves, balanceResponse] = await Promise.all([
          getMyLeaves(),
          getLeaveBalance()
        ]);
        renderEmployeeLeave(leaves, balanceResponse);
      } catch (error) {
        console.error('Error loading employee leave data:', error);
        document.getElementById("app").innerHTML = `
          ${renderSidebar("employee", "apply-leave")}
          <main class="main-content">
            ${renderTopbar("Apply Leave", "Employee / Leave")}
            <div class="content-area">
              <div class="card" style="padding:40px;text-align:center">
                <p style="color:var(--color-danger)">Failed to load leave data. Please try again.</p>
                <button class="btn btn-primary" onclick="loadAndRenderEmployeeLeave()">Retry</button>
              </div>
            </div>
          </main>
        `;
      }
    }

    function renderEmployeeLeave(leaves, balanceResponse) {
      // Backend getLeaveBalance returns: { success, employee_id, year, balance: { sick, casual, earned, unpaid } }
      const bal = balanceResponse.balance || {};
      const sickRemaining = bal.sick != null ? bal.sick : 10;
      const casualRemaining = bal.casual != null ? bal.casual : 12;
      const earnedRemaining = bal.earned != null ? bal.earned : 15;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "apply-leave")}
        <main class="main-content">
          ${renderTopbar("Apply Leave", "Employee / Leave")}
          <div class="content-area">
            
            <div class="stats-grid" style="margin-bottom: 28px;">
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Sick Leave</h4>
                  <div class="stat-value">${sickRemaining} / 10</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Casual Leave</h4>
                  <div class="stat-value">${casualRemaining} / 12</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon green">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-4 4-4-4"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Earned Leave</h4>
                  <div class="stat-value">${earnedRemaining} / 15</div>
                </div>
              </div>
            </div>

            <div style="max-width:600px; margin:0 auto">
              <div class="card">
                <div class="card-header"><h3>Apply for Leave</h3></div>
                <div class="card-body">
                  <form id="lForm">
                    <div class="form-group">
                      <label>Leave Type</label>
                      <select id="lt" class="form-control" required>
                        <option value="Sick">Sick Leave</option>
                        <option value="Earned">Earned Leave</option>
                        <option value="Casual">Casual Leave</option>
                        <option value="Unpaid">Unpaid Leave</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Day Type</label>
                      <select id="dt" class="form-control">
                        <option value="">Full Day</option>
                        <option value="First-Half">First Half</option>
                        <option value="Second-Half">Second Half</option>
                      </select>
                    </div>
                    <div class="grid-2">
                      <div class="form-group"><label>Start</label><input type="date" id="sd" class="form-control" required></div>
                      <div class="form-group"><label>End</label><input type="date" id="ed" class="form-control" required></div>
                    </div>
                    <div class="form-group">
                      <label>Reason</label>
                      <textarea id="re" class="form-control" placeholder="Please describe the reason for your leave..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Submit</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </main>
      `;

      document.getElementById("lForm").onsubmit = async (e) => {
        e.preventDefault();
        // Get employee ID from stored user data
        const empId = user.employeeData ? user.employeeData.id : user.id;
        const halfDay = document.getElementById("dt").value;

        const leaveData = {
          employee_id: empId,
          leave_type: document.getElementById("lt").value,
          start_date: document.getElementById("sd").value,
          end_date: document.getElementById("ed").value,
          half_day_type: halfDay || null,
          reason: document.getElementById("re").value
        };

        try {
          await apiPost(API.leaves.apply(), leaveData);
          showToast("Leave request submitted successfully!", "success");
          await loadAndRenderEmployeeLeave();
        } catch (error) {
          console.error('Error submitting leave:', error);
          showToast(error.message || "Failed to submit leave request", "error");
        }
      };
    }
  </script>
</body>

</html>
