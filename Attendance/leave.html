<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>HR Suite - Leaves</title><link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    if (user) { 
      if (user.role === "admin") renderAdminLeave(); 
      else renderEmployeeLeave();
      initSidebar(); 
    }

    // ===== Admin Leave Management =====
    function renderAdminLeave() {
      const leaves = getLeaves();
      const sortedLeaves = [...leaves].sort((a, b) => b.id - a.id);

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "leave-management")}
        <main class="main-content">
          ${renderTopbar("Leave Management", "Admin / Leaves")}
          <div class="content-area">
            <div class="card">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Employee</th>
                      <th>Type</th>
                      <th>Start</th>
                      <th>End</th>
                      <th>Leave Pending</th>
                      <th>Status</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${sortedLeaves.map(l => `
                      <tr>
                        <td><strong>${l.employeeName}</strong></td>
                        <td>${l.type}</td>
                        <td>${formatDate(l.startDate)}</td>
                        <td>${formatDate(l.endDate)}</td>
                        <td>12 Days</td>
                        <td>${getStatusBadge(l.status)}</td>
                        <td>
                          <div class="action-btns">
                            ${l.status === 'Pending' ? `
                              <button class="btn btn-success btn-sm" onclick="updateLeave(${l.id}, 'Approved')">Accept</button>
                              <button class="btn btn-danger btn-sm" onclick="updateLeave(${l.id}, 'Rejected')">Reject</button>
                            ` : `<span style="color: var(--color-text-muted); font-size: 0.8125rem;">Processed</span>`}
                          </div>
                        </td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      `;
    }

    function updateLeave(id, status) {
      const leaves = getLeaves();
      const leave = leaves.find(l => l.id === id);
      if (status === 'Rejected') {
        const reason = prompt("Please provide a reason for rejection:");
        if (reason === null) return;
        if (reason.trim() === "") {
          showToast("A reason is required for rejection", "error");
          return;
        }
        leave.rejectionReason = reason;
      }
      leave.status = status;
      saveLeaves(leaves);
      showToast(`Leave request ${status.toLowerCase()}`, "success");
      renderAdminLeave();
    }

    // ===== Employee Leave Application =====
    function renderEmployeeLeave() {
      const leaves = getLeaves();
      const empName = user.employeeData ? user.employeeData.name : user.name;
      
      // Calculate Dynamic Balances
      const myApprovedLeaves = leaves.filter(l => l.employeeName === empName && l.status === "Approved");
      
      const sickUsed = myApprovedLeaves.filter(l => l.type === "Sick Leave").length;
      const casualUsed = myApprovedLeaves.filter(l => l.type === "Casual Leave").length;
      const earnedUsed = myApprovedLeaves.filter(l => l.type === "Earned Leave").length;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "apply-leave")}
        <main class="main-content">
          ${renderTopbar("Apply Leave", "Employee / Leave")}
          <div class="content-area">
            
            <div class="stats-grid" style="margin-bottom: 28px;">
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Sick Leave</h4>
                  <div class="stat-value">${10 - sickUsed} / 10</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Casual Leave</h4>
                  <div class="stat-value">${12 - casualUsed} / 12</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon green">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8l-4 4-4-4"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Earned Leave</h4>
                  <div class="stat-value">${15 - earnedUsed} / 15</div>
                </div>
              </div>
            </div>

            <div style="max-width:600px; margin:0 auto">
              <div class="card">
                <div class="card-header"><h3>Apply for Leave</h3></div>
                <div class="card-body">
                  <form id="lForm">
                    <div class="form-group">
                      <label>Leave Type</label>
                      <select id="lt" class="form-control" required>
                        <option value="Sick Leave">Sick Leave</option>
                        <option value="Earned Leave">Earned Leave</option>
                        <option value="Casual Leave">Casual Leave</option>
                        <option value="Unpaid Leave">Unpaid Leave</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Day Type</label>
                      <select id="dt" class="form-control" required>
                        <option value="Full Day">Full Day</option>
                        <option value="Half Day">Half Day</option>
                      </select>
                    </div>
                    <div class="grid-2">
                      <div class="form-group"><label>Start</label><input type="date" id="sd" class="form-control" required></div>
                      <div class="form-group"><label>End</label><input type="date" id="ed" class="form-control" required></div>
                    </div>
                    <div class="form-group">
                      <label>Reason</label>
                      <textarea id="re" class="form-control" placeholder="Please describe the reason for your leave..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Submit</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </main>
      `;

      document.getElementById("lForm").onsubmit = (e) => { 
        e.preventDefault(); 
        const leaves = getLeaves();
        const empName = user.employeeData ? user.employeeData.name : user.name;
        
        const newLeave = {
          id: Date.now(),
          employeeName: empName,
          type: document.getElementById("lt").value,
          dayType: document.getElementById("dt").value,
          startDate: document.getElementById("sd").value,
          endDate: document.getElementById("ed").value,
          reason: document.getElementById("re").value,
          status: "Pending",
          rejectionReason: ""
        };

        leaves.push(newLeave);
        saveLeaves(leaves);
        showToast("Leave request submitted successfully!", "success");
        renderEmployeeLeave(); // Refresh cards immediately
      };
    }
  </script>
</body>
</html>
