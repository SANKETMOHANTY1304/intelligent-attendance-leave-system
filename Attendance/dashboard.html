<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    let trendChart; 

    if (user) {
      if (user.role === "admin") renderAdminDashboard();
      else renderEmployeeDashboard();
      initSidebar();
    }

    // ===== Admin Dashboard =====
    function renderAdminDashboard() {
      const employees = getEmployees();
      const attendance = getAttendance();
      const leaves = getLeaves();
      const onLeaveToday = attendance.filter(a => a.status === "On Leave").length;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "dashboard")}
        <main class="main-content">
          ${renderTopbar("Dashboard", "Home / Dashboard")}
          <div class="content-area">
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                <div class="stat-info"><h4>Total Employees</h4><div class="stat-value">${employees.length}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                <div class="stat-info"><h4>Present Today</h4><div class="stat-value">${attendance.filter(a => a.status === "Present").length}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/></svg></div>
                <div class="stat-info"><h4>On Leave Today</h4><div class="stat-value">${onLeaveToday}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div class="stat-info"><h4>Pending Approvals</h4><div class="stat-value">${leaves.filter(l => l.status === "Pending").length}</div></div>
              </div>
            </div>

            <div class="grid-2">
              <div class="card">
                <div class="card-header">
                  <h3>Attendance Trend</h3>
                  <div style="display: flex; gap: 8px;">
                    <button class="btn btn-outline btn-sm active" id="btnMonthly" onclick="switchTrend('monthly')">Monthly</button>
                    <button class="btn btn-outline btn-sm" id="btnYearly" onclick="switchTrend('yearly')">Yearly</button>
                  </div>
                </div>
                <div class="card-body"><canvas id="lineChartTrend"></canvas></div>
              </div>
              <div class="card">
                <div class="card-header"><h3>Department-wise Attendance %</h3></div>
                <div class="card-body"><canvas id="barChartDept"></canvas></div>
              </div>
            </div>
          </div>
        </main>
      `;
      renderAdminCharts();
    }

    function renderAdminCharts() {
      const lineCtx = document.getElementById("lineChartTrend").getContext("2d");
      trendChart = new Chart(lineCtx, {
        type: 'line',
        data: { 
          labels: ['Oct', 'Nov', 'Dec', 'Jan', 'Feb'], 
          datasets: [{ 
            label: 'Attendance %', 
            data: [85, 88, 82, 90, 94], 
            borderColor: '#2563EB', 
            fill: true, 
            backgroundColor: 'rgba(37, 99, 235, 0.1)',
            tension: 0.3
          }] 
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: false, max: 100 } }
        }
      });

      new Chart(document.getElementById("barChartDept"), {
        type: 'bar',
        data: { labels: ['Eng', 'Design', 'HR', 'Finance'], datasets: [{ label: 'Attendance %', data: [92, 85, 95, 89], backgroundColor: '#059669' }] }
      });
    }

    function switchTrend(view) {
      document.getElementById('btnMonthly').classList.remove('active');
      document.getElementById('btnYearly').classList.remove('active');
      if (view === 'monthly') {
        document.getElementById('btnMonthly').classList.add('active');
        trendChart.data.labels = ['Oct', 'Nov', 'Dec', 'Jan', 'Feb'];
        trendChart.data.datasets[0].data = [85, 88, 82, 90, 94];
      } else {
        document.getElementById('btnYearly').classList.add('active');
        trendChart.data.labels = ['2021', '2022', '2023', '2024', '2025'];
        trendChart.data.datasets[0].data = [78, 82, 85, 89, 92];
      }
      trendChart.update();
    }

    // ===== Employee Dashboard =====
    function renderEmployeeDashboard() {
      const empData = user.employeeData || {};
      const empName = empData.name || user.name;
      
      const allAttendance = getAttendance();
      const myAttendance = allAttendance.filter(a => a.employeeName === empName);
      const daysPresent = myAttendance.filter(a => a.status === "Present").length;

      const allLeaves = getLeaves();
      const myLeaves = allLeaves
        .filter(l => l.employeeName === empName)
        .sort((a, b) => b.id - a.id);

      const pendingLeavesCount = myLeaves.filter(l => l.status === "Pending").length;
      const approvedLeavesCount = myLeaves.filter(l => l.status === "Approved").length;
      const leaveBalance = 20 - approvedLeavesCount; // Assuming 20 days annual allowance
      
      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "dashboard")}
        <main class="main-content">
          ${renderTopbar("Dashboard", "Home / Dashboard")}
          <div class="content-area">
            <div class="welcome-banner"><h2>Welcome, ${user.name}</h2><p>Quick Access to your workspace.</p></div>
            
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon green">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-info"><h4>Days Present</h4><div class="stat-value">${daysPresent}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-info"><h4>Pending Leaves</h4><div class="stat-value">${pendingLeavesCount}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="stat-info"><h4>Approved Leaves</h4><div class="stat-value">${approvedLeavesCount}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon red">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
                <div class="stat-info"><h4>Leave Balance</h4><div class="stat-value">${leaveBalance}</div></div>
              </div>
            </div>

            <div class="grid-2">
              <div class="card">
                <div class="card-header"><h3>Quick Actions</h3></div>
                <div class="card-body">
                  <div class="quick-actions">
                    <a href="attendance.html" class="btn btn-primary">Mark Attendance</a>
                    <a href="leave.html" class="btn btn-outline">Apply Leave</a>
                    <a href="profile.html" class="btn btn-outline">My Profile</a>
                  </div>
                </div>
              </div>
              <div class="card">
                <div class="card-header"><h3>My Leave Requests</h3></div>
                <div class="table-wrapper">
                  <table>
                    <thead>
                      <tr>
                        <th>Type</th>
                        <th>Start</th>
                        <th>Status</th>
                        <th>Rejection Reason</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${myLeaves.slice(0, 5).map(l => `
                        <tr>
                          <td>${l.type}</td>
                          <td>${formatDate(l.startDate)}</td>
                          <td>${getStatusBadge(l.status)}</td>
                          <td style="color: var(--color-danger); font-size: 0.8125rem;">
                            ${(l.status === 'Rejected' && l.rejectionReason) ? l.rejectionReason : "-"}
                          </td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                  ${myLeaves.length === 0 ? '<p style="padding:20px; text-align:center; color:var(--color-text-muted);">No leave requests found.</p>' : ''}
                </div>
              </div>
            </div>
          </div>
        </main>
      `;
    }
  </script>
</body>
</html>
