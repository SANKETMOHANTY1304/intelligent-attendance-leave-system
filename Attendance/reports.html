<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Reports & Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="app-page">
  <div class="app-layout" id="app"></div>

  <script src="api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth("admin");
    if (user) {
      loadAndRenderReports();
      initSidebar();
    }

    async function loadAndRenderReports() {
      try {
        const employees = await apiGet(API.employees.all());
        renderReports(employees);
      } catch (error) {
        console.error('Error loading reports:', error);
        document.getElementById("app").innerHTML = `
          ${renderSidebar("admin", "reports")}
          <main class="main-content">
            ${renderTopbar("Reports & Analytics", "Admin / Reports")}
            <div class="content-area">
              <div class="card" style="padding:40px;text-align:center">
                <p style="color:var(--color-danger)">Failed to load reports. Please try again.</p>
                <button class="btn btn-primary" onclick="loadAndRenderReports()">Retry</button>
              </div>
            </div>
          </main>
        `;
      }
    }

    function renderReports(employees) {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const currentYear = new Date().getFullYear();

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "reports")}
        <main class="main-content">
          ${renderTopbar("Reports & Analytics", "Admin / Reports")}
          <div class="content-area">
            
            ${employees.length === 0 ? `
              <div class="card" style="padding: 60px 20px; text-align: center;">
                <div class="empty-state">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; color: var(--color-text-muted); margin-bottom: 16px;"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                  <h4>No Data Available</h4>
                  <p>No employees have registered yet. Reports will be generated from registered employee data, attendance records, and leave requests.</p>
                </div>
              </div>
            ` : `
            <div class="card" style="margin-bottom: 24px; padding: 20px;">
              <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
                <select id="reportMonth" class="form-control" style="width: 180px;">
                  ${months.map((m, i) => `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m}</option>`).join("")}
                </select>
                <select id="reportYear" class="form-control" style="width: 140px;">
                  <option value="${currentYear - 1}">${currentYear - 1}</option>
                  <option value="${currentYear}" selected>${currentYear}</option>
                  <option value="${currentYear + 1}">${currentYear + 1}</option>
                </select>
                <button class="btn btn-primary" style="padding: 10px 40px;" onclick="generateReport()">Generate</button>
                <button class="btn btn-outline" onclick="exportCSV()">Download CSV</button>
              </div>
            </div>

            <div id="reportResults" style="display: none;">
              <div class="card" style="margin-bottom: 24px;">
                <div class="card-header"><h3>Salary Report</h3></div>
                <div class="table-wrapper">
                  <table id="salaryTable">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Base Salary</th>
                        <th>Deductions</th>
                        <th>Net Salary</th>
                      </tr>
                    </thead>
                    <tbody id="salaryBody"></tbody>
                  </table>
                </div>
              </div>

              <div class="grid-2">
                <div class="card">
                  <div class="card-header"><h3>Leave Utilization</h3></div>
                  <div class="table-wrapper">
                    <table id="leaveTable">
                      <thead>
                        <tr><th>Employee</th><th>Total</th><th>Used</th><th>Remaining</th></tr>
                      </thead>
                      <tbody id="leaveBody"></tbody>
                    </table>
                  </div>
                </div>

                <div class="card">
                  <div class="card-header"><h3>Attendance Summary</h3></div>
                  <div class="card-body">
                    <div id="absenteeSummary" style="margin-bottom: 20px;">
                      <h4 style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 8px;">Top Absentees</h4>
                      <p id="topAbsentees" style="font-weight: 500;"></p>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 16px 0;">
                    <div>
                      <h4 style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 12px;">Department Averages (%)</h4>
                      <div id="deptAverages" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div id="emptyState" class="card" style="padding: 60px 20px; text-align: center;">
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; color: var(--color-text-muted); margin-bottom: 16px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <h4>No Report Generated</h4>
                <p>Select a month and year to view detailed analytics based on registered employee data.</p>
              </div>
            </div>
            `}
          </div>
        </main>
      `;
    }

    window.generateReport = async function () {
      const month = parseInt(document.getElementById("reportMonth").value) + 1; // Backend expects 1-indexed month
      const year = parseInt(document.getElementById("reportYear").value);

      try {
        // Use proper admin report APIs
        const [salaryReport, leaveReport, attendanceReport, deptReport] = await Promise.all([
          apiGet(`${API.reports.salary()}?month=${month}&year=${year}`),
          apiGet(`${API.reports.leaveUtilization()}?year=${year}`),
          apiGet(`${API.reports.attendanceSummary()}?month=${month}&year=${year}`),
          apiGet(`${API.reports.departmentAverages()}?month=${month}&year=${year}`)
        ]);

        const salaryBody = document.getElementById("salaryBody");
        const leaveBody = document.getElementById("leaveBody");
        const deptAvgContainer = document.getElementById("deptAverages");

        salaryBody.innerHTML = "";
        leaveBody.innerHTML = "";
        deptAvgContainer.innerHTML = "";

        // --- Salary Report ---
        const salaryData = salaryReport.employees || [];
        if (salaryData.length === 0) {
          showToast("No employee data found for this period", "error");
          return;
        }

        salaryData.forEach(emp => {
          const details = emp.employee_details || {};
          const baseSalary = details.base_salary ?? 0;
          const deductions = emp.deductions ?? 0;
          const netSalary = emp.net ?? 0;

          // Skip employees with errors (e.g. not yet joined)
          if (emp.error) {
            salaryBody.innerHTML += `
              <tr>
                <td><strong>${details.name || 'N/A'}</strong></td>
                <td><span class="badge badge-primary">${details.department || 'N/A'}</span></td>
                <td colspan="3" style="color:var(--color-text-muted); text-align:center">${emp.error || emp.message || 'Error calculating salary'}</td>
              </tr>
            `;
            return;
          }

          salaryBody.innerHTML += `
            <tr>
              <td><strong>${details.name || 'N/A'}</strong></td>
              <td><span class="badge badge-primary">${details.department || 'N/A'}</span></td>
              <td>${baseSalary > 0 ? '\u20B9' + baseSalary.toLocaleString('en-IN') : '<span style="color:var(--color-text-muted)">Not Assigned</span>'}</td>
              <td style="color:var(--color-danger)">-\u20B9${deductions.toLocaleString('en-IN')}</td>
              <td><strong>\u20B9${netSalary.toLocaleString('en-IN')}</strong></td>
            </tr>
          `;
        });

        // --- Leave Utilization ---
        const leaveData = leaveReport.data || [];
        leaveData.forEach(emp => {
          leaveBody.innerHTML += `
            <tr>
              <td>${emp.employee}</td>
              <td>${emp.total}</td>
              <td>${emp.used}</td>
              <td>${emp.remaining}</td>
            </tr>
          `;
        });

        // --- Attendance Summary (Top Absentees) ---
        const attSummary = attendanceReport.summary || {};
        const details = attSummary.details || [];
        const topAbs = [...details].sort((a, b) => b.absent - a.absent).slice(0, 3);
        document.getElementById("topAbsentees").innerText = topAbs.some(a => a.absent > 0)
          ? topAbs.filter(a => a.absent > 0).map(a => `${a.employee} (${a.absent} days)`).join(", ")
          : "No absences recorded for this period.";

        // --- Department Averages ---
        const departments = deptReport.departments || [];
        departments.forEach(dept => {
          deptAvgContainer.innerHTML += `
            <div style="display:flex; justify-content:space-between; font-size: 0.875rem;">
              <span>${dept.department}</span>
              <span style="font-weight: 600;">${dept.average_attendance_rate}%</span>
            </div>
          `;
        });

        document.getElementById("emptyState").style.display = "none";
        document.getElementById("reportResults").style.display = "block";
        showToast("Report generated successfully", "success");
      } catch (error) {
        console.error('Error generating report:', error);
        showToast(error.message || "Failed to generate report", "error");
      }
    };

    function exportCSV() {
      const resultsDiv = document.getElementById("reportResults");
      if (!resultsDiv || resultsDiv.style.display === "none") {
        showToast("Generate a report first to download", "error");
        return;
      }

      let csv = "Name,Department,Base Salary (INR),Deductions (INR),Net Salary (INR)\n";
      const rows = document.querySelectorAll("#salaryBody tr");
      rows.forEach(row => {
        const cols = row.querySelectorAll("td");
        const rowData = Array.from(cols).map(c => c.textContent.replace(/,/g, "").replace(/\u20B9/g, "").replace("-", "")).join(",");
        csv += rowData + "\n";
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', `Salary_Report_${document.getElementById("reportMonth").value}_${document.getElementById("reportYear").value}.csv`);
      a.click();
    }
  </script>
</body>

</html>
