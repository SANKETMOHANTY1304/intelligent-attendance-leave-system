<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Reports & Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth("admin");
    if (user) {
      renderReports();
      initSidebar();
    }

    function renderReports() {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const currentYear = new Date().getFullYear();
      
      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "reports")}
        <main class="main-content">
          ${renderTopbar("Reports & Analytics", "Admin / Reports")}
          <div class="content-area">
            
            <div class="card" style="margin-bottom: 24px; padding: 20px;">
              <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
                <select id="reportMonth" class="form-control" style="width: 180px;">
                  ${months.map((m, i) => `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m}</option>`).join("")}
                </select>
                <select id="reportYear" class="form-control" style="width: 140px;">
                  <option value="${currentYear - 1}">${currentYear - 1}</option>
                  <option value="${currentYear}" selected>${currentYear}</option>
                  <option value="${currentYear + 1}">${currentYear + 1}</option>
                </select>
                <button class="btn btn-primary" style="padding: 10px 40px;" onclick="generateReport()">Generate</button>
                <button class="btn btn-outline" onclick="exportCSV()">Download CSV</button>
              </div>
            </div>

            <div id="reportResults" style="display: none;">
              <div class="card" style="margin-bottom: 24px;">
                <div class="card-header"><h3>Salary Report</h3></div>
                <div class="table-wrapper">
                  <table id="salaryTable">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Base Salary</th>
                        <th>Deductions</th>
                        <th>Net Salary</th>
                      </tr>
                    </thead>
                    <tbody id="salaryBody"></tbody>
                  </table>
                </div>
              </div>

              <div class="grid-2">
                <div class="card">
                  <div class="card-header"><h3>Leave Utilization</h3></div>
                  <div class="table-wrapper">
                    <table id="leaveTable">
                      <thead>
                        <tr><th>Employee</th><th>Total</th><th>Used</th><th>Remaining</th></tr>
                      </thead>
                      <tbody id="leaveBody"></tbody>
                    </table>
                  </div>
                </div>

                <div class="card">
                  <div class="card-header"><h3>Attendance Summary</h3></div>
                  <div class="card-body">
                    <div id="absenteeSummary" style="margin-bottom: 20px;">
                      <h4 style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 8px;">Top Absentees</h4>
                      <p id="topAbsentees" style="font-weight: 500;"></p>
                    </div>
                    <hr style="border: 0; border-top: 1px solid var(--color-border); margin: 16px 0;">
                    <div>
                      <h4 style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 12px;">Department Averages (%)</h4>
                      <div id="deptAverages" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div id="emptyState" class="card" style="padding: 60px 20px; text-align: center;">
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; color: var(--color-text-muted); margin-bottom: 16px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <h4>No Report Generated</h4>
                <p>Select a month and year to view detailed analytics.</p>
              </div>
            </div>
          </div>
        </main>
      `;
    }

    function generateReport() {
      const month = parseInt(document.getElementById("reportMonth").value);
      const year = parseInt(document.getElementById("reportYear").value);
      const employees = getEmployees();
      const attendance = getAttendance();
      const leaves = getLeaves();

      const salaryBody = document.getElementById("salaryBody");
      const leaveBody = document.getElementById("leaveBody");
      const deptAvgContainer = document.getElementById("deptAverages");
      
      salaryBody.innerHTML = "";
      leaveBody.innerHTML = "";
      deptAvgContainer.innerHTML = "";

      const monthPrefix = `${year}-${(month + 1).toString().padStart(2, '0')}`;
      const absenteeCounts = [];

      employees.forEach(emp => {
        // 1. Calculate Salary Data
        const monthlyAttendance = attendance.filter(a => a.employeeName === emp.name && a.date.startsWith(monthPrefix));
        const absentDays = monthlyAttendance.filter(a => a.status === "Absent").length;
        absenteeCounts.push({ name: emp.name, count: absentDays });

        const baseSalary = parseFloat(emp.salary.replace(/,/g, ""));
        const deduction = Math.round(absentDays * (baseSalary / 30));
        const netSalary = baseSalary - deduction;

        salaryBody.innerHTML += `
          <tr>
            <td><strong>${emp.name}</strong></td>
            <td><span class="badge badge-primary">${emp.department}</span></td>
            <td>$${emp.salary}</td>
            <td style="color:var(--color-danger)">-$${deduction.toLocaleString()}</td>
            <td><strong>$${netSalary.toLocaleString()}</strong></td>
          </tr>
        `;

        // 2. Calculate Leave Utilization
        const usedLeaves = leaves.filter(l => l.employeeName === emp.name && l.status === "Approved").length;
        leaveBody.innerHTML += `
          <tr>
            <td>${emp.name}</td>
            <td>20</td>
            <td>${usedLeaves}</td>
            <td>${20 - usedLeaves}</td>
          </tr>
        `;
      });

      // 3. Department Averages
      const departments = [...new Set(employees.map(e => e.department))];
      departments.forEach(dept => {
        const deptEmps = employees.filter(e => e.department === dept);
        let totalPresent = 0;
        let totalPotential = deptEmps.length * 22; // Working days estimation

        deptEmps.forEach(emp => {
          totalPresent += attendance.filter(a => a.employeeName === emp.name && a.date.startsWith(monthPrefix) && (a.status === "Present" || a.status === "Late")).length;
        });

        const avg = totalPotential > 0 ? Math.round((totalPresent / totalPotential) * 100) : 0;
        deptAvgContainer.innerHTML += `
          <div style="display:flex; justify-content:space-between; font-size: 0.875rem;">
            <span>${dept}</span>
            <span style="font-weight: 600;">${avg}%</span>
          </div>
        `;
      });

      // 4. Top Absentees Summary
      const topAbs = absenteeCounts.sort((a, b) => b.count - a.count).slice(0, 3);
      document.getElementById("topAbsentees").innerText = topAbs.some(a => a.count > 0) 
        ? topAbs.filter(a => a.count > 0).map(a => `${a.name} (${a.count} days)`).join(", ")
        : "No absences recorded for this period.";

      document.getElementById("emptyState").style.display = "none";
      document.getElementById("reportResults").style.display = "block";
      showToast("Report generated successfully", "success");
    }

    function exportCSV() {
      const resultsDiv = document.getElementById("reportResults");
      if (resultsDiv.style.display === "none") {
        showToast("Generate a report first to download", "error");
        return;
      }

      let csv = "Name,Department,Base Salary,Deductions,Net Salary\n";
      const rows = document.querySelectorAll("#salaryBody tr");
      rows.forEach(row => {
        const cols = row.querySelectorAll("td");
        const rowData = Array.from(cols).map(c => c.textContent.replace(/,/g, "").replace("$", "").replace("-", "")).join(",");
        csv += rowData + "\n";
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      a.setAttribute('download', `Salary_Report_${document.getElementById("reportMonth").value}_${document.getElementById("reportYear").value}.csv`);
      a.click();
    }
  </script>
</body>
</html>
