<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><title>HR Suite - Reports</title><link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth("admin");
    if (user) { renderReports(); initSidebar(); }

    function renderReports() {
      const emps = getEmployees();
      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "reports")}
        <main class="main-content">
          ${renderTopbar("Reports", "Admin / Reports")}
          <div class="content-area">
            <div class="card" style="margin-bottom:24px">
              <div class="card-header"><h3>Salary Report</h3><button class="btn btn-outline btn-sm" onclick="exportCSV()">Download CSV</button></div>
              <div class="table-wrapper"><table id="sTable">
                <thead><tr><th>Name</th><th>Dept</th><th>Base</th><th>Deductions</th><th>Net</th></tr></thead>
                <tbody>${emps.map(e => `<tr><td>${e.name}</td><td>${e.department}</td><td>$${e.salary}</td><td>$0</td><td>$${e.salary}</td></tr>`).join("")}</tbody>
              </table></div>
            </div>
            <div class="grid-2">
              <div class="card"><div class="card-header"><h3>Leave Utilization</h3></div><div class="table-wrapper"><table><thead><tr><th>Employee</th><th>Usage</th><th>Allowance</th></tr></thead><tbody><tr><td>Arjun Mehta</td><td>3</td><td>20</td></tr><tr><td>Priya Sharma</td><td>2</td><td>20</td></tr></tbody></table></div></div>
              <div class="card"><div class="card-header"><h3>Attendance Summary</h3></div><div class="card-body">
                <p><strong>Top Absentees:</strong> Sneha Iyer, Rahul Gupta</p><hr style="margin:10px 0; border:0; border-top:1px solid #eee">
                <p><strong>Dept Averages:</strong> Engineering (94%), Design (88%), HR (92%)</p>
              </div></div>
            </div>
          </div>
        </main>
      `;
    }
    function exportCSV() {
      let csv = "Name,Dept,Base,Deductions,Net\n";
      document.querySelectorAll("#sTable tr").forEach(r => { 
        const cols = r.querySelectorAll("td, th");
        csv += Array.from(cols).map(c => c.textContent).join(",") + "\n";
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Salary_Report.csv';
      a.click();
    }
  </script>
</body>
</html>
