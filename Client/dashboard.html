<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      if (user.role === "admin") {
        renderAdminDashboard();
      } else {
        renderEmployeeDashboard();
      }
      initSidebar();
    }

    function renderAdminDashboard() {
      const employees = getEmployees();
      const attendance = getAttendance();
      const leaves = getLeaves();

      const totalEmployees = employees.length;
      const presentToday = attendance.filter(a => a.status === "Present").length;
      const pendingLeaves = leaves.filter(l => l.status === "Pending").length;
      const departments = [...new Set(employees.map(e => e.department))].length;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "dashboard")}
        <main class="main-content">
          ${renderTopbar("Dashboard", "Home / Dashboard")}
          <div class="content-area">
            <div class="welcome-banner">
              <h2>Welcome back, Admin</h2>
              <p>Here is what is happening with your team today.</p>
            </div>

            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Total Employees</h4>
                  <div class="stat-value">${totalEmployees}</div>
                  <div class="stat-change positive">+2 this month</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon green">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Present Today</h4>
                  <div class="stat-value">${presentToday}</div>
                  <div class="stat-change positive">${Math.round(presentToday/totalEmployees*100)}% attendance</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Pending Leaves</h4>
                  <div class="stat-value">${pendingLeaves}</div>
                  <div class="stat-change">Requires attention</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon red">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Departments</h4>
                  <div class="stat-value">${departments}</div>
                  <div class="stat-change positive">All active</div>
                </div>
              </div>
            </div>

            <div class="grid-2">
              <div class="card">
                <div class="card-header">
                  <h3>Recent Leave Requests</h3>
                  <a href="leave.html" class="btn btn-outline btn-sm">View All</a>
                </div>
                <div class="table-wrapper">
                  <table>
                    <thead>
                      <tr>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>Duration</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${leaves.slice(0, 4).map(l => `
                        <tr>
                          <td><strong>${l.employeeName}</strong></td>
                          <td>${l.type}</td>
                          <td>${formatDate(l.startDate)}</td>
                          <td>${getStatusBadge(l.status)}</td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3>Recent Activity</h3>
                </div>
                <div class="card-body">
                  <div class="activity-list">
                    <div class="activity-item">
                      <div class="activity-dot green"></div>
                      <div>
                        <div class="activity-text"><strong>Arjun Mehta</strong> checked in at 09:05 AM</div>
                        <div class="activity-time">Today, 9:05 AM</div>
                      </div>
                    </div>
                    <div class="activity-item">
                      <div class="activity-dot blue"></div>
                      <div>
                        <div class="activity-text"><strong>Priya Sharma</strong> submitted a leave request</div>
                        <div class="activity-time">Today, 8:30 AM</div>
                      </div>
                    </div>
                    <div class="activity-item">
                      <div class="activity-dot orange"></div>
                      <div>
                        <div class="activity-text"><strong>Rahul Gupta</strong> was marked late</div>
                        <div class="activity-time">Today, 9:30 AM</div>
                      </div>
                    </div>
                    <div class="activity-item">
                      <div class="activity-dot green"></div>
                      <div>
                        <div class="activity-text"><strong>Vikram Patel</strong> leave request approved</div>
                        <div class="activity-time">Yesterday, 4:15 PM</div>
                      </div>
                    </div>
                    <div class="activity-item">
                      <div class="activity-dot blue"></div>
                      <div>
                        <div class="activity-text"><strong>New employee</strong> Meera Joshi onboarded</div>
                        <div class="activity-time">Yesterday, 10:00 AM</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card" style="margin-top: 24px;">
              <div class="card-header">
                <h3>Today's Attendance Overview</h3>
                <a href="attendance.html" class="btn btn-outline btn-sm">Full Report</a>
              </div>
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Employee</th>
                      <th>Date</th>
                      <th>Check In</th>
                      <th>Check Out</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${attendance.slice(0, 5).map(a => `
                      <tr>
                        <td><strong>${a.employeeName}</strong></td>
                        <td>${formatDate(a.date)}</td>
                        <td>${a.checkIn}</td>
                        <td>${a.checkOut}</td>
                        <td>${getStatusBadge(a.status)}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      `;
    }

    function renderEmployeeDashboard() {
      const empData = user.employeeData || {};
      const attendance = getAttendance();
      const leaves = getLeaves();
      const myAttendance = attendance.filter(a => a.employeeName === empData.name || a.employeeName === user.name);
      const myLeaves = leaves.filter(l => l.employeeName === empData.name || l.employeeName === user.name);
      const presentDays = myAttendance.filter(a => a.status === "Present").length;
      const pendingLeaves = myLeaves.filter(l => l.status === "Pending").length;
      const approvedLeaves = myLeaves.filter(l => l.status === "Approved").length;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "dashboard")}
        <main class="main-content">
          ${renderTopbar("Dashboard", "Home / Dashboard")}
          <div class="content-area">
            <div class="welcome-banner">
              <h2>Welcome, ${user.name}</h2>
              <p>${empData.designation || "Employee"} &middot; ${empData.department || "General"} Department</p>
            </div>

            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon green">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Days Present</h4>
                  <div class="stat-value">${presentDays}</div>
                  <div class="stat-change positive">This month</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon orange">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Pending Leaves</h4>
                  <div class="stat-value">${pendingLeaves}</div>
                  <div class="stat-change">Awaiting approval</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon blue">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Approved Leaves</h4>
                  <div class="stat-value">${approvedLeaves}</div>
                  <div class="stat-change positive">This year</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon red">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-info">
                  <h4>Leave Balance</h4>
                  <div class="stat-value">18</div>
                  <div class="stat-change">Days remaining</div>
                </div>
              </div>
            </div>

            <div class="grid-2">
              <div class="card">
                <div class="card-header">
                  <h3>Quick Actions</h3>
                </div>
                <div class="card-body">
                  <div class="quick-actions">
                    <a href="attendance.html" class="btn btn-primary">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                      Mark Attendance
                    </a>
                    <a href="leave.html" class="btn btn-outline">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      Apply Leave
                    </a>
                    <a href="profile.html" class="btn btn-outline">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                      My Profile
                    </a>
                  </div>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3>My Leave Requests</h3>
                </div>
                ${myLeaves.length > 0 ? `
                <div class="table-wrapper">
                  <table>
                    <thead>
                      <tr><th>Type</th><th>Start</th><th>End</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                      ${myLeaves.map(l => `
                        <tr>
                          <td>${l.type}</td>
                          <td>${formatDate(l.startDate)}</td>
                          <td>${formatDate(l.endDate)}</td>
                          <td>${getStatusBadge(l.status)}</td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>
                ` : `
                <div class="card-body">
                  <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <h4>No leave requests</h4>
                    <p>You have not submitted any leave requests yet.</p>
                  </div>
                </div>
                `}
              </div>
            </div>
          </div>
        </main>
      `;
    }
  </script>
</body>
</html>
