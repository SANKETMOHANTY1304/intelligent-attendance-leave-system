<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth("employee");
    if (user) {
      renderProfile();
      initSidebar();
    }

    function renderProfile() {
      const emp = user.employeeData || {};
      const initials = (emp.name || user.name || "U").split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2);

      // Calculate stats
      const attendance = getAttendance();
      const leaves = getLeaves();
      const empName = emp.name || user.name;
      const myAttendance = attendance.filter(a => a.employeeName === empName);
      const presentDays = myAttendance.filter(a => a.status === "Present").length;
      const lateDays = myAttendance.filter(a => a.status === "Late").length;
      const myLeaves = leaves.filter(l => l.employeeName === empName);
      const approvedLeaves = myLeaves.filter(l => l.status === "Approved").length;

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "my-profile")}
        <main class="main-content">
          ${renderTopbar("My Profile", "Employee / Profile")}
          <div class="content-area">
            <div class="card">
              <div class="card-body" style="padding:32px">
                <div class="profile-header">
                  <div class="profile-avatar">${initials}</div>
                  <div class="profile-info">
                    <h2>${emp.name || user.name}</h2>
                    <p>${emp.designation || "Employee"} &middot; ${emp.department || "General"}</p>
                    <p style="margin-top:4px"><span class="badge badge-success">Active</span></p>
                  </div>
                </div>

                <div style="margin-bottom:32px">
                  <h3 style="font-size:1rem;font-weight:600;color:var(--color-text);margin-bottom:16px">Personal Information</h3>
                  <div class="detail-grid">
                    <div class="detail-item">
                      <label>Full Name</label>
                      <span>${emp.name || user.name}</span>
                    </div>
                    <div class="detail-item">
                      <label>Email Address</label>
                      <span>${emp.email || user.email}</span>
                    </div>
                    <div class="detail-item">
                      <label>Department</label>
                      <span>${emp.department || "General"}</span>
                    </div>
                    <div class="detail-item">
                      <label>Designation</label>
                      <span>${emp.designation || "Employee"}</span>
                    </div>
                    <div class="detail-item">
                      <label>Salary</label>
                      <span>$${emp.salary || "60,000"}</span>
                    </div>
                    <div class="detail-item">
                      <label>Joining Date</label>
                      <span>${emp.joiningDate ? formatDate(emp.joiningDate) : "N/A"}</span>
                    </div>
                  </div>
                </div>

                <div>
                  <h3 style="font-size:1rem;font-weight:600;color:var(--color-text);margin-bottom:16px">Employment Summary</h3>
                  <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="stat-card">
                      <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                      </div>
                      <div class="stat-info">
                        <h4>Present Days</h4>
                        <div class="stat-value">${presentDays}</div>
                      </div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-icon orange">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                      </div>
                      <div class="stat-info">
                        <h4>Late Days</h4>
                        <div class="stat-value">${lateDays}</div>
                      </div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      </div>
                      <div class="stat-info">
                        <h4>Leaves Taken</h4>
                        <div class="stat-value">${approvedLeaves}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      `;
    }
  </script>
</body>
</html>
