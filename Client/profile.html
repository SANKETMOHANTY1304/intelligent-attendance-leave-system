<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - My Profile</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>
  <script src="js/app.js"></script>
  <script>
    const user = requireAuth("employee");
    if (user) {
      // Access employee data synced from the main employee list
      const emp = user.employeeData || {};
      
      // Use the name from the employee list if available, otherwise fallback to login name
      const fullName = emp.name || user.name;
      const initials = fullName.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2);

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "my-profile")}
        <main class="main-content">
          ${renderTopbar("My Profile", "Profile")}
          <div class="content-area">
            <div class="card">
              <div class="card-body" style="padding:32px">
                <div class="profile-header">
                  <div class="profile-avatar">${initials}</div>
                  <div class="profile-info">
                    <h2>${fullName}</h2>
                    <p>${emp.designation || 'Employee'}</p>
                    <p style="margin-top: 4px;"><span class="badge badge-success">Active</span></p>
                  </div>
                </div>

                <h3>Personal Details</h3>
                <div class="detail-grid" style="margin-top:20px">
                  <div class="detail-item">
                    <label>Full Name</label>
                    <span>${fullName}</span>
                  </div>

                  <div class="detail-item">
                    <label>Email Address</label>
                    <span>${user.email}</span>
                  </div>

                  <div class="detail-item">
                    <label>Designation</label>
                    <span>${emp.designation || 'General Staff'}</span>
                  </div>

                  <div class="detail-item">
                    <label>Department</label>
                    <span>${emp.department || 'General'}</span>
                  </div>

                  <div class="detail-item">
                    <label>Annual Salary</label>
                    <span>$${emp.salary || '0.00'}</span>
                  </div>

                  <div class="detail-item">
                    <label>Joining Date</label>
                    <span>${formatDate(emp.joiningDate || '2024-01-01')}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      `;
      initSidebar();
    }
  </script>
</body>
</html>
