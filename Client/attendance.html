<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Suite - Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout" id="app"></div>

  <script src="js/app.js"></script>
  <script>
    const user = requireAuth();
    if (user) { 
      if (user.role === "admin") renderAdminAttendance(); 
      else renderEmployeeAttendance();
      initSidebar(); 
    }

    function renderAdminAttendance() {
      const attendance = getAttendance();
      // Only show records for the current day as per previous requirement
      const today = new Date().toISOString().split('T')[0];
      const records = attendance.filter(a => a.date === today);

      document.getElementById("app").innerHTML = `
        ${renderSidebar("admin", "attendance")}
        <main class="main-content">
          ${renderTopbar("Attendance Tracker", "Admin / Today")}
          <div class="content-area">
            <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
              <div class="stat-card">
                <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="stat-info"><h4>Late</h4><div class="stat-value">${records.filter(a=>a.status==="Late").length}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                <div class="stat-info"><h4>Absent</h4><div class="stat-value">${records.filter(a=>a.status==="Absent").length}</div></div>
              </div>
              <div class="stat-card">
                <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div class="stat-info"><h4>On Leave</h4><div class="stat-value">${records.filter(a=>a.status==="On Leave").length}</div></div>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><h3>Daily Attendance (${formatDate(today)})</h3></div>
              <div class="table-wrapper">
                <table>
                  <thead><tr><th>Employee</th><th>Check In</th><th>Check Out</th><th>Status</th></tr></thead>
                  <tbody>
                    ${records.map(a => `<tr><td><strong>${a.employeeName}</strong></td><td>${a.checkIn}</td><td>${a.checkOut}</td><td>${getStatusBadge(a.status)}</td></tr>`).join("")}
                  </tbody>
                </table>
                ${records.length === 0 ? '<p style="padding:20px; text-align:center">No records for today yet.</p>' : ''}
              </div>
            </div>
          </div>
        </main>
      `;
    }

    function renderEmployeeAttendance() {
      const activeSession = JSON.parse(localStorage.getItem(`active_att_${user.email}`));
      const empName = user.employeeData?.name || user.name;
      const myRecords = getAttendance().filter(a => a.employeeName === empName);
      
      const today = new Date().toISOString().split('T')[0];

      // Comprehensive Holiday List for 2026
      const allHolidays = [
        { date: "2026-01-01", name: "New Year's Day" },
        { date: "2026-01-26", name: "Republic Day" },
        { date: "2026-02-15", name: "Maha Shivratri" },
        { date: "2026-03-14", name: "Holi" },
        { date: "2026-04-03", name: "Good Friday" },
        { date: "2026-04-14", name: "Ambedkar Jayanti" },
        { date: "2026-04-20", name: "Eid-ul-Fitr" },
        { date: "2026-08-15", name: "Independence Day" },
        { date: "2026-08-28", name: "Raksha Bandhan" },
        { date: "2026-09-04", name: "Janmashtami" },
        { date: "2026-10-02", name: "Gandhi Jayanti" },
        { date: "2026-10-12", name: "Dussehra" },
        { date: "2026-11-01", name: "Diwali" },
        { date: "2026-12-25", name: "Christmas Day" }
      ];

      // Filter for holidays occurring today or in the future
      const upcomingHolidays = allHolidays.filter(h => h.date >= today);

      document.getElementById("app").innerHTML = `
        ${renderSidebar("employee", "my-attendance")}
        <main class="main-content">
          ${renderTopbar("My Attendance", "Employee / Attendance")}
          <div class="content-area">
            <div class="grid-2" style="margin-bottom:24px; align-items: stretch;">
              <div class="card">
                <div class="card-header"><h3>Daily Attendance</h3></div>
                <div class="card-body" style="text-align:center; display: flex; flex-direction: column; justify-content: center; height: 100%;">
                  <div id="timer" style="font-size:3.5rem; font-weight:700; color:var(--color-primary); margin:20px 0">00:00:00</div>
                  <div style="display:flex;gap:12px;justify-content:center">
                    <button id="inBtn" class="btn btn-success" ${activeSession ? 'disabled' : ''}>Check In</button>
                    <button id="outBtn" class="btn btn-danger" ${!activeSession ? 'disabled' : ''}>Check Out</button>
                  </div>
                </div>
              </div>

              <div class="card">
                <div class="card-header"><h3>Attendance History</h3></div>
                <div class="table-wrapper">
                  <table>
                    <thead><tr><th>Date</th><th>In</th><th>Out</th><th>Status</th></tr></thead>
                    <tbody>
                      ${myRecords.slice(-5).reverse().map(r => `
                        <tr>
                          <td>${formatDate(r.date)}</td>
                          <td>${r.checkIn}</td>
                          <td>${r.checkOut}</td>
                          <td>${getStatusBadge(r.status)}</td>
                        </tr>`).join("")}
                    </tbody>
                  </table>
                  ${myRecords.length === 0 ? '<p style="padding:20px; text-align:center; font-size: 0.875rem;">No history found.</p>' : ''}
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header"><h3>Upcoming Holidays</h3></div>
              <div class="card-body">
                <div style="display:flex; gap:16px; flex-wrap:wrap">
                  ${upcomingHolidays.map(h => `
                    <div style="background:var(--color-primary-lighter); padding:16px; border-radius:var(--radius-sm); flex:1; min-width:200px; border-left: 4px solid var(--color-primary);">
                      <div style="font-size: 0.75rem; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase;">${formatDate(h.date)}</div>
                      <div style="color:var(--color-text); font-weight: 700; margin-top: 4px;">${h.name}</div>
                    </div>`).join("")}
                  ${upcomingHolidays.length === 0 ? '<p style="color: var(--color-text-secondary)">No more holidays scheduled for this year.</p>' : ''}
                </div>
              </div>
            </div>
          </div>
        </main>
      `;

      // Timer Logic
      if (activeSession) {
        setInterval(() => {
          const d = new Date(new Date().getTime() - activeSession.start);
          document.getElementById("timer").textContent = d.toISOString().substr(11, 8);
        }, 1000);
      }

      document.getElementById("inBtn").onclick = () => {
        const startTime = new Date().getTime();
        const checkInTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        localStorage.setItem(`active_att_${user.email}`, JSON.stringify({ start: startTime, in: checkInTime }));
        location.reload();
      };

      document.getElementById("outBtn").onclick = () => {
        const s = JSON.parse(localStorage.getItem(`active_att_${user.email}`));
        const checkOutTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        const att = getAttendance();
        
        att.push({
          employeeName: empName,
          date: new Date().toISOString().split('T')[0],
          checkIn: s.in,
          checkOut: checkOutTime,
          status: s.in > "09:15" ? "Late" : "Present"
        });

        saveAttendance(att);
        localStorage.removeItem(`active_att_${user.email}`);
        location.reload();
      };
    }
  </script>
</body>
</html>
